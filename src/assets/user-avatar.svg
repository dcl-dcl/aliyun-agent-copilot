      <path d='M226 390h60l-10 45h-40z' fill='#f1f5f9' />
      <!-- 领带/细节改为系统青绿 -->
      <path d='M253 390h6v45h-6z' fill='#2DC8C8' />
      <circle cx='168' cy='245' r='20' fill='#ffdfcc' />
      <circle cx='344' cy='245' r='20' fill='#f5b895' />
      <path d='M180 230c0-90 20-95 76-95s76 5 76 95-27 112-76 112-76-27-76-112z' fill='url(#u_skin)' />
      <path d='M250 225l6 19 6-19z' fill='#e5a383' opacity='0.9' />
      <path d='M242 282c4 4 10 13 28 0' stroke='#a7684d' stroke-width='3' stroke-linecap='round' />
      <!-- 头发改为系统深黑色 -->
      <path d='M168 215c-8-45 12-100 72-105 50-5 100 5 104 75 1 15-14 15-14 0 0-35-40-55-74-55-41 0-66 30-66 85z' fill='#1E222D' />
