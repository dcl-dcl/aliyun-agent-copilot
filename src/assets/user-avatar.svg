      <rect x='186' y='205' width='58' height='38' rx='8' stroke='#1E222D' stroke-width='4.5' />
      <rect x='268' y='205' width='58' height='38' rx='8' stroke='#1E222D' stroke-width='4.5' />
      <path d='M244 218h24' stroke='#1E222D' stroke-width='5' />
      <!-- 高光点缀改为系统青绿 -->
      <path d='M192 225l25-15m57 15l25-15' stroke='#2DC8C8' stroke-width='4' stroke-linecap='round' />
    </g>
